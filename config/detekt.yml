# Detekt configuration for Android AI Studio Template
build:
  maxIssues: 20

comments:
  CommentOverPrivateFunction:
    active: false

complexity:
  LongMethod:
    threshold: 60
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15

naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']

style:
  MagicNumber:
    ignoreAnnotated: ['Composable', 'Preview']
  WildcardImport:
    active: true
