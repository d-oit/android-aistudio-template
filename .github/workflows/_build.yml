name: Reusable Build and Verify

on:
  workflow_call:
    secrets:
      CODACY_PROJECT_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          packages: 'platforms;android-36 build-tools;35.0.0'

      - name: Make Harness Executable
        run: chmod +x harness.sh

      - name: Auto-fix Formatting
        run: ./harness.sh format

      - name: Run Quality Gate Pipeline
        run: ./harness.sh verify
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Coverage to Codacy
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: app/build/reports/jacoco/jacocoTestReportDebug/jacocoTestReportDebug.xml
