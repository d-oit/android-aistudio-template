name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-build:
    name: Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup JDK 21
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@00854ea68c109d98c75d956347303bf7c45b0277 # v3.2.1
        with:
          packages: 'platforms;android-36 build-tools;35.0.0'

      - name: Grant harness execute permission
        run: chmod +x harness.sh

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > keystore/release.jks

      - name: Build Release APK
        run: ./harness.sh build-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

