name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-build:
    name: Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          packages: 'platforms;android-36 build-tools;35.0.0'

      - name: Grant harness execute permission
        run: chmod +x harness.sh

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > keystore/release.jks

      - name: Build Release APK
        run: ./harness.sh build-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

